name: Deploy Springboard Connector
on:
  push:
    branches: [main, feature/springboard-connector]
    paths:
      - "springboard/**"
      - ".github/workflows/springboard_deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fivetran-connector-sdk

      - name: Create configuration.json
        working-directory: "./springboard"
        env:
          KQED_SPRINGBOARD_CONNECTION_STRING: ${{ secrets.KQED_SPRINGBOARD_CONNECTION_STRING }}
        run: |
          echo "Creating configuration.json with provided secrets..."
          cat <<EOF > configuration.json
          {
            "connection_string": "$KQED_SPRINGBOARD_CONNECTION_STRING"
          }
          EOF

      - name: Deploy to Fivetran
        working-directory: "./springboard"
        env:
          FIVETRAN_API_KEY: ${{ secrets.FIVETRAN_API_KEY }}
          FIVETRAN_DESTINATION: ${{ secrets.SPRINGBOARD_FIVETRAN_DESTINATION }}
        run: |
          fivetran deploy --api-key $FIVETRAN_API_KEY --destination $FIVETRAN_DESTINATION --configuration ./configuration.json --connection springboard_client_kqed --force
