# THROWAWAY: one-shot secret export for repo migration.
# Delete this workflow after downloading the artifact.
#
# Usage:
#   1. Push this workflow on a branch and open a PR → main (same repo, not a fork)
#   2. Download the "deploy-secrets-export" artifact from the PR check run
#   3. Close/delete the PR, then delete this workflow file and the run history
#
# Values are written only to the artifact file (not echoed to logs).
# GitHub still masks secret values if they appear in logs.
# Note: secrets are only available for same-repo PRs (not fork PRs).
# GitHub has no API to list secret *values*; names must be enumerated explicitly.

name: Export Deploy Secrets (throwaway)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets map to file
        env:
          # Full repo secrets list (Settings → Secrets and variables → Actions)
          BGCA_FUNDRAISEUP_API_KEY: ${{ secrets.BGCA_FUNDRAISEUP_API_KEY }}
          FIVETRAN_API_KEY: ${{ secrets.FIVETRAN_API_KEY }}
          FIVETRAN_DESTINATION: ${{ secrets.FIVETRAN_DESTINATION }}
          FIVETRAN_FUNDRAISEUP_DESTINATION: ${{ secrets.FIVETRAN_FUNDRAISEUP_DESTINATION }}
          FIVETRAN_UAT_DESTINATION: ${{ secrets.FIVETRAN_UAT_DESTINATION }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          IDONATE_FIVETRAN_DESTINATION: ${{ secrets.IDONATE_FIVETRAN_DESTINATION }}
          KQED_SPRINGBOARD_CONNECTION_STRING: ${{ secrets.KQED_SPRINGBOARD_CONNECTION_STRING }}
          ONGAGE_FIVETRAN_DESTINATION: ${{ secrets.ONGAGE_FIVETRAN_DESTINATION }}
          SFL_ONGAGE_ACCOUNT_CODE: ${{ secrets.SFL_ONGAGE_ACCOUNT_CODE }}
          SFL_ONGAGE_PASSWORD: ${{ secrets.SFL_ONGAGE_PASSWORD }}
          SFL_ONGAGE_USERNAME: ${{ secrets.SFL_ONGAGE_USERNAME }}
          SFL_VIRTUOUS_BEARER_TOKEN: ${{ secrets.SFL_VIRTUOUS_BEARER_TOKEN }}
          SPRINGBOARD_FIVETRAN_DESTINATION: ${{ secrets.SPRINGBOARD_FIVETRAN_DESTINATION }}
          SUBMANAGER_ACCOUNT_IDS: ${{ secrets.SUBMANAGER_ACCOUNT_IDS }}
          THF_IDONATE_APIKEY: ${{ secrets.THF_IDONATE_APIKEY }}
          THF_IDONATE_BASEURL: ${{ secrets.THF_IDONATE_BASEURL }}
          THF_IDONATE_ORGID: ${{ secrets.THF_IDONATE_ORGID }}
          VIRTUOUS_FIVETRAN_DESTINATION: ${{ secrets.VIRTUOUS_FIVETRAN_DESTINATION }}
        run: |
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          # Every secret currently listed in repo Settings → Actions secrets
          keys = [
              "BGCA_FUNDRAISEUP_API_KEY",
              "FIVETRAN_API_KEY",
              "FIVETRAN_DESTINATION",
              "FIVETRAN_FUNDRAISEUP_DESTINATION",
              "FIVETRAN_UAT_DESTINATION",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "GOOGLE_LOGIN_CUSTOMER_ID",
              "GOOGLE_REFRESH_TOKEN",
              "IDONATE_FIVETRAN_DESTINATION",
              "KQED_SPRINGBOARD_CONNECTION_STRING",
              "ONGAGE_FIVETRAN_DESTINATION",
              "SFL_ONGAGE_ACCOUNT_CODE",
              "SFL_ONGAGE_PASSWORD",
              "SFL_ONGAGE_USERNAME",
              "SFL_VIRTUOUS_BEARER_TOKEN",
              "SPRINGBOARD_FIVETRAN_DESTINATION",
              "SUBMANAGER_ACCOUNT_IDS",
              "THF_IDONATE_APIKEY",
              "THF_IDONATE_BASEURL",
              "THF_IDONATE_ORGID",
              "VIRTUOUS_FIVETRAN_DESTINATION",
          ]

          # Not referenced by any workflow in this repo (orphaned / legacy)
          unused_in_repo = {
              "BGCA_FUNDRAISEUP_API_KEY",
              "FIVETRAN_FUNDRAISEUP_DESTINATION",
              "FIVETRAN_UAT_DESTINATION",
          }

          used_by = {
              "FIVETRAN_API_KEY": ["all deploy workflows"],
              "FIVETRAN_DESTINATION": [
                  "weather_deploy.yml",
                  "sa360_custom_columns_deploy.yml",
                  "sa360_custom_keywords_deploy.yml",
              ],
              "VIRTUOUS_FIVETRAN_DESTINATION": ["virtuous_deploy.yml"],
              "ONGAGE_FIVETRAN_DESTINATION": ["ongage_deploy.yml"],
              "IDONATE_FIVETRAN_DESTINATION": ["idonate_deploy.yml"],
              "SPRINGBOARD_FIVETRAN_DESTINATION": ["springboard_deploy.yml"],
              "SFL_VIRTUOUS_BEARER_TOKEN": ["virtuous_deploy.yml → configuration.json bearer_token"],
              "SFL_ONGAGE_USERNAME": ["ongage_deploy.yml → configuration.json x_username"],
              "SFL_ONGAGE_PASSWORD": ["ongage_deploy.yml → configuration.json x_password"],
              "SFL_ONGAGE_ACCOUNT_CODE": ["ongage_deploy.yml → configuration.json x_account_code"],
              "THF_IDONATE_APIKEY": ["idonate_deploy.yml → configuration.json api_key"],
              "THF_IDONATE_BASEURL": ["idonate_deploy.yml → configuration.json base_url"],
              "THF_IDONATE_ORGID": ["idonate_deploy.yml → configuration.json organization_id"],
              "KQED_SPRINGBOARD_CONNECTION_STRING": ["springboard_deploy.yml → configuration.json"],
              "GOOGLE_CLIENT_ID": ["sa360_*_deploy.yml → configuration.json"],
              "GOOGLE_CLIENT_SECRET": ["sa360_*_deploy.yml → configuration.json"],
              "GOOGLE_REFRESH_TOKEN": ["sa360_*_deploy.yml → configuration.json"],
              "GOOGLE_LOGIN_CUSTOMER_ID": ["sa360_*_deploy.yml → configuration.json"],
              "SUBMANAGER_ACCOUNT_IDS": ["sa360_*_deploy.yml → configuration.json"],
              "BGCA_FUNDRAISEUP_API_KEY": ["not referenced in repo (legacy FundraiseUp?)"],
              "FIVETRAN_FUNDRAISEUP_DESTINATION": ["not referenced in repo (legacy FundraiseUp?)"],
              "FIVETRAN_UAT_DESTINATION": ["not referenced in repo (legacy UAT destination?)"],
          }

          secrets = {}
          missing = []
          for key in keys:
              value = os.environ.get(key, "")
              if value:
                  secrets[key] = value
              else:
                  missing.append(key)

          payload = {
              "exported_at": datetime.now(timezone.utc).isoformat(),
              "note": "Throwaway export of all listed GitHub Actions repo secrets. Delete after migration.",
              "secrets": secrets,
              "missing_or_empty": missing,
              "unused_in_current_workflows": sorted(unused_in_repo),
              "used_by": used_by,
          }

          with open("deploy-secrets-export.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Wrote {len(secrets)} secrets; {len(missing)} missing/empty.")
          print(f"Unused in current workflows: {', '.join(sorted(unused_in_repo))}")
          if missing:
              print("Missing or empty keys (names only):")
              for key in missing:
                  print(f"  - {key}")
          PY

      - name: Upload secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-secrets-export
          path: deploy-secrets-export.json
          retention-days: 1
          if-no-files-found: error
